<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Generador de imágenes de waifus aleatorias - SFW y NSFW">
    <title>🌸 Waifu Random</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>🌸 Waifu Random</h1>
        
        <div class="category-select">
            <label for="type-select">Tipo:</label>
            <select id="type-select">
                <option value="sfw">SFW ✅</option>
                <option value="nsfw">NSFW 🔞</option>
            </select>
            
            <label for="category-select" style="margin-left: 15px;">Categoría:</label>
            <select id="category-select">
                <option value="waifu">Waifu</option>
                <option value="kiss">Kiss</option>
                <option value="neko">Neko</option>
                <option value="futa" class="nsfw-only" hidden>Futa</option>
            </select>
        </div>
        
        <div id="nsfw-msg" class="nsfw-warning" hidden>
            ⚠️ Contenido NSFW - Solo para mayores de 18
        </div>
        
        <div class="image-container">
            <div id="loading" class="loading">Cargando imagen...</div>
            <img id="waifu-img" hidden alt="Waifu aleatoria">
            <div id="error" class="error" hidden></div>
        </div>
        
        <div class="buttons">
            <button class="btn btn-primary" id="btn-random">🎲 Nueva Imagen</button>
            <button class="btn btn-secondary" id="btn-copy">📋 Copiar URL</button>
        </div>
        
        <div class="info">
            <p id="image-info"></p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
